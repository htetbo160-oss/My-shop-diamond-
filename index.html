<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO GAME SHOP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0f75ff, #00c6ff);
  color: white;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px;
}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 40px;
  border-radius: 10px;
  margin-right: 10px;
}

.menu {
  font-size: 25px;
  background: #ddd;
  color: black;
  padding: 5px 12px;
  border-radius: 10px;
}

/* Card */
.card {
  background: #eee;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.green { background: green; }
.blue { background: #007bff; }

/* Game Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.game {
  background: white;
  color: black;
  border-radius: 15px;
  text-align: center;
  padding: 10px;
}

.game img {
  width: 100%;
  border-radius: 10px;
}

.buy {
  background: #111;
  color: white;
  padding: 8px;
  margin-top: 5px;
  border-radius: 10px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.8;
}
</style>

</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <img src="https://via.placeholder.com/40">
    <b>SO GAME SHOP</b>
  </div>
  <div class="menu">☰</div>
</div>

<!-- Balance -->
<div class="card">
  <h3>Balance: 83100 Ks</h3>

  <div class="btn green" onclick="goPage('payment.html')">Recharge</div>
  <div class="btn blue" onclick="goPage('games.html')">Buy Diamonds</div>
  <div class="btn blue" onclick="goPage('history.html')">History</div>
</div>

<!-- Game List -->
<h2 style="padding-left:10px;">All Games</h2>

<div class="grid">

  <div class="game">
    <img src="https://via.placeholder.com/150">
    <p>Mobile Legends</p>
    <div class="buy" onclick="goPage('mlbb.html')">Buy Now</div>
  </div>

  <div class="game">
    <img src="https://via.placeholder.com/150">
    <p>PUBG Mobile</p>
    <div class="buy">Buy Now</div>
  </div>

  <div class="game">
    <img src="https://via.placeholder.com/150">
    <p>Free Fire</p>
    <div class="buy">Buy Now</div>
  </div>

</div>

<div class="footer">
  Privacy Policy | Terms & Conditions
</div>

<script>
function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>

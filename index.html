<!DOCTYPE html>
<html>
<head>
<title>Diamond Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.header{
  padding:20px;
  background:#020617;
}

h1{
  color:#38bdf8;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e293b;
  margin:15px;
  padding:20px;
  border-radius:15px;
  width:250px;
}

.price{
  color:#22c55e;
  font-size:20px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.footer{
  margin-top:30px;
  padding:20px;
  background:#020617;
}
</style>

</head>

<body>

<div class="header">
<h1>💎 Diamond Shop</h1>
<p>Mobile Legend Diamond Store</p>
</div>

<div class="container">

<div class="card">
<h2>86 Diamond</h2>
<p class="price">5500 MMK</p>
</div>

<div class="card">
<h2>172 Diamond</h2>
<p class="price">11000 MMK</p>
</div>

<div class="card">
<h2>257 Diamond</h2>
<p class="price">17000 MMK</p>
</div>

</div>

<div class="footer">
<p>📩 Telegram - @BoBoEdit34</p>
<p>📞 09776937797</p>
</div>

<!-- ✅ ORDER FORM (ONLY ONE) -->
<div style="margin-top:30px;">
<h2>📝 Order Form</h2>

<form onsubmit="sendToTelegram(); return false;">

<input type="text" id="gameId" placeholder="Your Game ID" required
style="padding:10px;margin:10px;width:80%;"><br>

<select id="diamond" style="padding:10px;margin:10px;width:85%;">
<option value="">Select Diamond</option>
<option value="86">86 Diamond</option>
<option value="172">172 Diamond</option>
<option value="257">257 Diamond</option>
</select><br>

<button type="submit">Submit Order</button>

</form>
</div>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function sendToTelegram(){

var id = document.getElementById("gameId").value;
var diamond = document.getElementById("diamond").value;

if(id === "" || diamond === ""){
  alert("Fill all fields!");
  return;
}

// ✅ Firebase save
db.collection("orders").add({
  gameId: id,
  diamond: diamond,
  time: new Date()
});

// ✅ Telegram message
var message = "I want " + diamond + " Diamond. My ID - " + id;
var url = "https://t.me/BoBoEdit34?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}
</script>

</body>
</html>
